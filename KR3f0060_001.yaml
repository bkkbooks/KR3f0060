body:
  text: 徐整長曆徐整長曆泉陽之精上令為日徑千里周圍三千里下於天七千里月徑千里周圍三千里下於天十千里大星徑百里中星五十小星三十北斗七星問相去九千里皆在日月下黃帝時風不鳴條雨不破塊也星者元氣之英水之精也曆北斗當崑崙氣連注天下春夏為雨露秋冬為霜雪溟涬始牙濛鴻滋萌歲起攝提元氣肇啓有神靈人十三日頭號曰天皇天地混沌如雞子盤古生其中萬八千歲天地開闢陽清為天陰濁為地盤古在其中一曰九變神於天聖於地天日高一丈地日厚一丈盤古日長一丈如此萬八千歲天數極高地數極深盤古極長後乃有三皇數起於一立於三成於一盛於七處於九故去地九萬里
